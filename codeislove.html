    <button class="theme-btn" data-theme="cyberpunk" title="Cyberpunk Pink" style="background: #ff0080;"></button>
    <button class="theme-btn" data-theme="emerald" title="Neon Emerald" style="background: #00e676;"></button>

    <button class="theme-btn" data-theme="space" title="Aura Blue" style="background: #00bfff;"></button>

  <!-- Floating New Note Creator Popover -->
  <div id="new-note-popover">
    <textarea id="popover-note-input" placeholder="Type a note..." rows="3"></textarea>
    <div class="popover-actions">
      <button id="popover-cancel-btn" class="popover-btn">Cancel</button>
      <button id="popover-save-btn" class="popover-btn">Add Note</button>
    </div>
  </div>

  <!-- Container for active Draggable Notes -->
  <div id="draggable-notes-container"></div>

  <!-- Scripts -->
  <script>
    // Theme Switcher Logic
    const themeButtons = document.querySelectorAll('.theme-btn');
    
    function setTheme(themeName) {
      document.body.setAttribute('data-theme', themeName);
      localStorage.setItem('theme', themeName);
      
      themeButtons.forEach(btn => {
        if (btn.getAttribute('data-theme') === themeName) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    const savedTheme = localStorage.getItem('theme') || 'obsidian';
    setTheme(savedTheme);

    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const theme = btn.getAttribute('data-theme');
        setTheme(theme);
      });
    });

    // Sync theme-button active status on load
    const activeTheme = localStorage.getItem('theme') || 'obsidian';
    themeButtons.forEach(btn => {
      if (btn.getAttribute('data-theme') === activeTheme) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    // Google Search logic
    function googleSearch() {
      var text = document.getElementById("search").value;
      if (text.trim() !== "") {
        var url = 'https://www.google.com/search?q=' + encodeURIComponent(text);
        window.location.href = url;
      }
    }
    
    document.getElementById("search").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        googleSearch();
      }
    });

    // Mouse move effect for header card glow
    const card = document.querySelector('.header-card');
    if (card) {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mouse-x', `${x}%`);
        card.style.setProperty('--mouse-y', `${y}%`);
      });
    }

    // Draggable Sticky Notes Logic
    const popover = document.getElementById('new-note-popover');
    const toggleBtn = document.getElementById('notes-toggle-btn');
    const cancelBtn = document.getElementById('popover-cancel-btn');
    const saveBtn = document.getElementById('popover-save-btn');
    const noteInput = document.getElementById('popover-note-input');
    const notesContainer = document.getElementById('draggable-notes-container');

    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      popover.classList.toggle('open');
      if (popover.classList.contains('open')) {
        noteInput.focus();
      }
    });

    cancelBtn.addEventListener('click', () => {
      popover.classList.remove('open');
      noteInput.value = '';
    });

    document.addEventListener('click', (e) => {
      if (!popover.contains(e.target) && e.target !== toggleBtn && !toggleBtn.contains(e.target)) {
        popover.classList.remove('open');
      }
    });

    let notes = JSON.parse(localStorage.getItem('sticky_notes')) || [];
    notes = notes.map((note, index) => {
      if (!note.id) note.id = Date.now() + index + Math.random();
      if (note.colorIndex === undefined) note.colorIndex = Math.floor(Math.random() * 5);
      return note;
    });

    function saveNotes() {
      localStorage.setItem('sticky_notes', JSON.stringify(notes));
    }

    const colorClasses = ['gold', 'mint', 'pink', 'blue', 'purple'];

    function renderNotes() {
      const oldNotes = document.querySelectorAll('.draggable-note');
      oldNotes.forEach(el => el.remove());
      
      notes.forEach((note, index) => {
        const noteEl = document.createElement('div');
        const colorName = colorClasses[note.colorIndex !== undefined ? note.colorIndex : (index % 5)];
        noteEl.className = `draggable-note note-color-${colorName}`;
        noteEl.id = `note-${note.id}`;
        
        let x = note.x !== undefined ? note.x : (window.innerWidth - 240);
        let y = note.y !== undefined ? note.y : (100 + (index * 45) % (window.innerHeight - 220));
        
        x = Math.max(10, Math.min(x, window.innerWidth - 220));
        y = Math.max(10, Math.min(y, window.innerHeight - 160));
        
        noteEl.style.left = `${x}px`;
        noteEl.style.top = `${y}px`;
        
        noteEl.innerHTML = `
          <div class="note-header-drag">
            <div class="note-drag-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <button class="note-close-btn-mini" onclick="deleteNote('${note.id}')" title="Delete Note">&times;</button>
          </div>
          <div class="note-body-content">${escapeHtml(note.text)}</div>
          <div class="note-date-footer">${note.date}</div>
        `;
        
        notesContainer.appendChild(noteEl);
        initDrag(noteEl, note.id);
      });
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function initDrag(noteEl, noteId) {
      const handle = noteEl.querySelector('.note-header-drag');
      let isDragging = false;
      let startX = 0, startY = 0;
      let initialX = 0, initialY = 0;

      handle.addEventListener('mousedown', dragStart);
      handle.addEventListener('touchstart', dragStart, { passive: false });

      function dragStart(e) {
        isDragging = true;
        noteEl.classList.add('dragging');
        
        initialX = noteEl.offsetLeft;
        initialY = noteEl.offsetTop;

        if (e.type === 'touchstart') {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
        } else {
          startX = e.clientX;
          startY = e.clientY;
        }

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend', dragEnd);
      }

      function dragMove(e) {
        if (!isDragging) return;
        if (e.type === 'touchmove') e.preventDefault();

        let currentX, currentY;
        if (e.type === 'touchmove') {
          currentX = e.touches[0].clientX;
          currentY = e.touches[0].clientY;
        } else {
          currentX = e.clientX;
          currentY = e.clientY;
        }

        const dx = currentX - startX;
        const dy = currentY - startY;

        let newLeft = initialX + dx;
        let newTop = initialY + dy;

        newLeft = Math.max(10, Math.min(newLeft, window.innerWidth - noteEl.offsetWidth - 10));
        newTop = Math.max(10, Math.min(newTop, window.innerHeight - noteEl.offsetHeight - 10));

        noteEl.style.left = `${newLeft}px`;
        noteEl.style.top = `${newTop}px`;
      }

      function dragEnd() {
        if (!isDragging) return;
        isDragging = false;
        noteEl.classList.remove('dragging');

        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend', dragEnd);

        const noteObj = notes.find(n => String(n.id) === String(noteId));
        if (noteObj) {
          noteObj.x = noteEl.offsetLeft;
          noteObj.y = noteEl.offsetTop;
          saveNotes();
        }
      }
    }

    function addNote() {
      const text = noteInput.value.trim();
      if (text === '') return;
      
      const newNote = {
        id: Date.now() + Math.random(),
        text: text,
        date: new Date().toLocaleDateString('en-US', { 
          month: 'short', 
          day: 'numeric', 
          hour: '2-digit', 
          minute: '2-digit' 
        }),
        x: window.innerWidth - 230 - (notes.length % 3) * 15,
        y: 120 + (notes.length % 5) * 45,
        colorIndex: Math.floor(Math.random() * 5)
      };
      
      notes.unshift(newNote);
      saveNotes();
      renderNotes();
      noteInput.value = '';
      popover.classList.remove('open');
    }

    window.deleteNote = function(noteId) {
      notes = notes.filter(n => String(n.id) !== String(noteId));
      saveNotes();
      renderNotes();
    };

    saveBtn.addEventListener('click', addNote);

    noteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addNote();
      }
    });

    window.addEventListener('resize', renderNotes);
    renderNotes();
  </script>

  <!-- Interactive Curve Arrow Guide -->
  <script>
    (function() {
      const aboutBtn = document.getElementById('about-nav-item');
      const profilePic = document.querySelector('.profile-container img');
      const svg = document.getElementById('arrow-overlay-svg');
      const curvePath = document.getElementById('curve-path');

      function getRelativeBounds(el) {
        const rect = el.getBoundingClientRect();
        return {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height
        };
      }

      function updateCurve() {
        if (!aboutBtn || !profilePic) return;
        const aboutBounds = getRelativeBounds(aboutBtn);
        const profileBounds = getRelativeBounds(profilePic);

        const x1 = aboutBounds.left + aboutBounds.width - 15;
        const y1 = aboutBounds.top + aboutBounds.height / 2;

        const x2 = profileBounds.left + 5;
        const y2 = profileBounds.top + profileBounds.height / 2;

        const cx = (x1 + x2) / 2 + 60;
        const cy = (y1 + y2) / 2 - 30;

        curvePath.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
      }

      aboutBtn.addEventListener('mouseenter', () => {
        updateCurve();
        curvePath.style.opacity = '1';
        const length = curvePath.getTotalLength();
        curvePath.style.strokeDasharray = length;
        curvePath.style.strokeDashoffset = length;
        curvePath.getBoundingClientRect();
        curvePath.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease';
        curvePath.style.strokeDashoffset = '0';
      });

      aboutBtn.addEventListener('mouseleave', () => {
        curvePath.style.opacity = '0';
      });

      window.addEventListener('resize', updateCurve);
      window.addEventListener('scroll', updateCurve, true);
    })();
  </script>
